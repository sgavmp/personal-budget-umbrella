name: HomeBalance

options:
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  defaultConfig: Debug
  xcodeVersion: "16.0"
  bundleIdPrefix: com.homebalance

packages:
  CodableCSV:
    url: https://github.com/dehesa/CodableCSV
    from: 0.6.7
  CoreXLSX:
    url: https://github.com/CoreOffice/CoreXLSX
    from: 0.14.0

targets:

  # ── iOS Application ──────────────────────────────────────────────────────────
  HomeBalance:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HomeBalance
    resources:
      - HomeBalance/Resources
    dependencies:
      - package: CodableCSV
      - package: CoreXLSX
    info:
      path: HomeBalance/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        CFBundleDisplayName: HomeBalance
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.homebalance.app
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: HomeBalance/Info.plist
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
    entitlements:
      path: HomeBalance/HomeBalance.entitlements
      properties:
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.homebalance.app
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.homebalance.app

  # ── macOS Application ─────────────────────────────────────────────────────────
  HomeBalance-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: HomeBalance
    resources:
      - HomeBalance/Resources
    dependencies:
      - package: CodableCSV
      - package: CoreXLSX
    info:
      path: HomeBalance/Info-macOS.plist
      properties:
        CFBundleDisplayName: HomeBalance
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: "Copyright © 2025 HomeBalance. All rights reserved."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.homebalance.app.macos
        PRODUCT_NAME: HomeBalance
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: HomeBalance/Info-macOS.plist
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
    entitlements:
      path: HomeBalance/HomeBalance.entitlements
      properties:
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.homebalance.app
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.homebalance.app
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true

  # ── iOS Unit Tests ─────────────────────────────────────────────────────────────
  HomeBalanceTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HomeBalanceTests
    dependencies:
      - target: HomeBalance
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.homebalance.tests
        SWIFT_VERSION: "6.0"

  # ── macOS Unit Tests ───────────────────────────────────────────────────────────
  HomeBalanceTests-macOS:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: HomeBalanceTests
    dependencies:
      - target: HomeBalance-macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.homebalance.tests.macos
        SWIFT_VERSION: "6.0"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HomeBalance.app/Contents/MacOS/HomeBalance"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  HomeBalance-iOS:
    build:
      targets:
        HomeBalance: all
    test:
      targets:
        - HomeBalanceTests
      coverageTargets:
        - HomeBalance
    run:
      config: Debug
    archive:
      config: Release

  HomeBalance-macOS:
    build:
      targets:
        HomeBalance-macOS: all
    test:
      targets:
        - HomeBalanceTests-macOS
      coverageTargets:
        - HomeBalance-macOS
    run:
      config: Debug
    archive:
      config: Release
